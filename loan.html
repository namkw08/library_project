<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>무인 대출 시스템 - 도서 정보 입력</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<body>
    <div class="container">
        <h2>📖 대출 도서 정보 입력</h2>
        
        <div class="admin-section">
            <label class="admin-label">⚙️ 관리자: 도서관 보유 목록 엑셀 등록</label>
            <input type="file" id="bookFile" accept=".xlsx, .xls">
            <p class="admin-help">※ '도서명'과 '저자' 열이 포함된 엑셀 파일을 첨부하세요.</p>
        </div>

        <p class="subtitle"><span id="userName" class="highlight"></span>님, 대출할 도서 정보를 입력해 주세요.</p>
        
        <form id="loanForm">
            <div class="input-group">
                <label for="bookTitle">도서명</label>
                <input type="text" id="bookTitle" placeholder="정확한 도서명을 입력하세요" required>
            </div>
            <div class="input-group">
                <label for="bookAuthor">저자</label>
                <input type="text" id="bookAuthor" placeholder="저자 이름을 입력하세요" required>
            </div>
            <div class="btn-group">
                <button type="button" class="btn btn-secondary" id="prevBtn">이전</button>
                <button type="submit" class="btn">대출 신청</button>
            </div>
        </form>

        <div id="resultMessage" class="alert-box hidden"></div>
    </div>

    <script>
        const currentUser = JSON.parse(localStorage.getItem('currentUser'));
        if (!currentUser) {
            alert('잘못된 접근입니다. 학번 입력을 먼저 해주세요.');
            window.location.href = 'index.html';
        } else {
            document.getElementById('userName').textContent = `${currentUser.id} ${currentUser.name}`;
        }

        // 업로드된 엑셀에서 추출한 보유 도서 목록을 저장할 배열
        let libraryBooks = [];

        // 도서 목록 엑셀 파일 읽기 처리
        document.getElementById('bookFile').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(evt) {
                const data = new Uint8Array(evt.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const sheetName = workbook.SheetNames[0];
                const sheet = workbook.Sheets[sheetName];
                
                const rows = XLSX.utils.sheet_to_json(sheet);
                
                // 엑셀 행 데이터에서 '도서명'과 '저자'를 매핑하여 저장
                libraryBooks = rows.map(row => ({
                    title: String(row['도서명'] || '').trim(),
                    author: String(row['저자'] || '').trim()
                })).filter(book => book.title.length > 0);

                alert(`✅ 보유 도서 데이터 엑셀 반영 완료! (총 ${libraryBooks.length}권 등록됨)`);
                localStorage.setItem('libraryBookList', JSON.stringify(libraryBooks));
            };
            reader.readAsArrayBuffer(file);
        });

        // 페이지 로드 시 기존에 로드해 둔 도서 리스트가 있다면 불러오기
        window.addEventListener('DOMContentLoaded', () => {
            const savedBooks = localStorage.getItem('libraryBookList');
            if (savedBooks) {
                libraryBooks = JSON.parse(savedBooks);
            }
        });

        document.getElementById('prevBtn').addEventListener('click', () => {
            window.location.href = 'index.html';
        });

        document.getElementById('loanForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const title = document.getElementById('bookTitle').value.trim();
            const author = document.getElementById('bookAuthor').value.trim();
            const resultBox = document.getElementById('resultMessage');

            // 1. 실제 사용자가 첨부한 도서 엑셀 리스트에서 책이 존재하는지 검색 비교
            const bookExists = libraryBooks.some(book => book.title === title && book.author === author);

            if (bookExists) {
                resultBox.innerHTML = `🎉 <strong>대출 완료!</strong><br>'${title}' 대출 처리가 완료되었습니다. 대출 내역 엑셀 다운로드를 확인하세요.`;
                resultBox.className = "alert-box success";
                
                // 대출 기록 엑셀 저장 및 내보내기 호출
                exportToExcel(currentUser.id, currentUser.name, title, author);
            } else {
                resultBox.innerHTML = `❌ <strong>존재하지 않는 도서 고지</strong><br>입력하신 '${title}' (${author} 저) 도서는 오늘 등록된 도서관 보유 엑셀 파일에 존재하지 않거나 정보가 다릅니다.`;
                resultBox.className = "alert-box danger";
            }
            resultBox.classList.remove('hidden');
        });

        // 대출 완료 시 엑셀 파일로 추출하는 함수 (기존 로직 유지)
        function exportToExcel(studentId, name, bookTitle, bookAuthor) {
            const today = new Date();
            const loanDate = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')} ${String(today.getHours()).padStart(2,'0')}:${String(today.getMinutes()).padStart(2,'0')}`;

            const excelData = [
                ["학번", "이름", "도서명", "저자", "대출일시"],
                [studentId, name, bookTitle, bookAuthor, loanDate]
            ];

            const worksheet = XLSX.utils.aoa_to_sheet(excelData);
            const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, "대출 기록");

            worksheet['!cols'] = [{wch: 12}, {wch: 12}, {wch: 25}, {wch: 20}, {wch: 20}];

            XLSX.writeFile(workbook, `도서대출기록_${studentId}.xlsx`);
        }
    </script>
</body>
</html>
