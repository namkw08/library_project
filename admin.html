<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>무인 대출 시스템 - 관리자 설정</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<body>
    <div class="container">
        <h2>시스템 관리자 설정</h2>
        <p class="subtitle">무인 대출 검증용 파일 등록 및 내역을 관리합니다.</p>
        
        <div class="admin-panel">
            <label class="admin-label">1. 연체자 목록 파일 (.xlsx)</label>
            <input type="file" id="overdueFile" accept=".xlsx, .xls">
            <p id="overdueStatus" class="status-text text-gray">등록된 파일 없음</p>
        </div>

        <div class="admin-panel">
            <label class="admin-label">2. 도서관 보유 목록 파일 (.xlsx)</label>
            <input type="file" id="bookFile" accept=".xlsx, .xls">
            <p id="bookStatus" class="status-text text-gray">등록된 파일 없음</p>
        </div>

        <div class="admin-panel">
            <label class="admin-label">3. 대출 신청 내역 다운로드</label>
            <p id="historyStatus" class="status-text text-gray">현재 0건의 대출 기록이 있습니다.</p>
            <div class="btn-group" style="margin-top: 10px;">
                <button type="button" class="btn" id="downloadHistoryBtn">엑셀 다운로드</button>
                <button type="button" class="btn btn-secondary" id="clearHistoryBtn">내역 초기화</button>
            </div>
        </div>

        <button type="button" class="btn" onclick="location.href='index.html'" style="margin-top: 20px;">메인 화면으로 돌아가기</button>
    </div>

    <script>
        // 페이지 로드 시 기존에 등록해둔 데이터 수량 표시
        window.addEventListener('DOMContentLoaded', () => {
            const savedOverdue = JSON.parse(localStorage.getItem('overdueList') || "[]");
            const savedBooks = JSON.parse(localStorage.getItem('libraryBookList') || "[]");
            const historyData = JSON.parse(localStorage.getItem('loanHistory') || "[]");
            
            if(savedOverdue.length > 0) document.getElementById('overdueStatus').innerHTML = `현재 <strong>${savedOverdue.length}명</strong>의 연체자 등록 중`;
            if(savedBooks.length > 0) document.getElementById('bookStatus').innerHTML = `현재 <strong>${savedBooks.length}권</strong>의 보유 도서 등록 중`;
            
            document.getElementById('historyStatus').innerHTML = `현재 <strong>${historyData.length}건</strong>의 대출 기록이 있습니다.`;
        });

        // 1. 연체자 엑셀 처리
        document.getElementById('overdueFile').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(evt) {
                const data = new Uint8Array(evt.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const rows = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
                const overdueStudents = rows.map(row => String(row['학번'] || row['학번 '] || '')).filter(id => id.length > 0);
                
                localStorage.removeItem('overdueList');
                localStorage.setItem('overdueList', JSON.stringify(overdueStudents));
                document.getElementById('overdueStatus').innerHTML = `반영 완료: 기존 데이터 초기화 및 <strong>${overdueStudents.length}명</strong> 새로 등록됨`;
            };
            reader.readAsArrayBuffer(file);
        });

        // 2. 보유 도서 엑셀 처리
        document.getElementById('bookFile').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(evt) {
                const data = new Uint8Array(evt.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const rows = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
                const libraryBooks = rows.map(row => ({
                    title: String(row['도서명'] || '').trim(),
                    author: String(row['저자'] || '').trim()
                })).filter(book => book.title.length > 0);

                localStorage.removeItem('libraryBookList');
                localStorage.setItem('libraryBookList', JSON.stringify(libraryBooks));
                document.getElementById('bookStatus').innerHTML = `반영 완료: 기존 데이터 초기화 및 <strong>${libraryBooks.length}권</strong> 새로 등록됨`;
            };
            reader.readAsArrayBuffer(file);
        });

        // 3. 대출 내역 다운로드 및 초기화 처리
        document.getElementById('downloadHistoryBtn').addEventListener('click', function() {
            const historyData = JSON.parse(localStorage.getItem('loanHistory') || "[]");
            
            if (historyData.length === 0) {
                alert("다운로드할 대출 내역이 없습니다.");
                return;
            }

            const excelData = [["학번", "이름", "도서명", "저자", "대출일시"]];
            historyData.forEach(record => {
                excelData.push([record.studentId, record.name, record.bookTitle, record.bookAuthor, record.date]);
            });

            const worksheet = XLSX.utils.aoa_to_sheet(excelData);
            const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, "대출 기록");
            worksheet['!cols'] = [{wch: 12}, {wch: 12}, {wch: 30}, {wch: 20}, {wch: 20}];

            const today = new Date();
            const fileName = `전체대출내역_${today.getFullYear()}${String(today.getMonth()+1).padStart(2,'0')}${String(today.getDate()).padStart(2,'0')}.xlsx`;
            
            XLSX.writeFile(workbook, fileName);
        });

        document.getElementById('clearHistoryBtn').addEventListener('click', function() {
            if (confirm("모든 대출 내역이 삭제됩니다. 계속하시겠습니까?")) {
                localStorage.removeItem('loanHistory');
                document.getElementById('historyStatus').innerHTML = `현재 <strong>0건</strong>의 대출 기록이 있습니다.`;
                alert("대출 내역이 초기화되었습니다.");
            }
        });
    </script>
</body>
</html>
