<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>무인 대출 시스템 - 사용자 인증</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>📚 무인 도서 대출 시스템</h2>
        <p class="subtitle">학번과 이름을 입력해 주세요.</p>
        
        <form id="loginForm">
            <div class="input-group">
                <label for="studentId">학번 (5자리)</label>
                <input type="text" id="studentId" placeholder="예: 30205 (3학년 2반 5번)" maxlength="5" required>
            </div>
            <div class="input-group">
                <label for="studentName">이름</label>
                <input type="text" id="studentName" placeholder="예: 홍길동" required>
            </div>
            <div class="btn-group">
                <button type="button" class="btn btn-secondary" disabled>이전</button>
                <button type="submit" class="btn">다음</button>
            </div>
        </form>

        <div id="alertMessage" class="alert-box hidden"></div>
    </div>

    <script>
        // [엑셀 데이터시트 #1] 연체자 학번 데이터 목록
        const overdueExcelSheet = ["30201", "30202", "10115"];

        // 페이지 로드 시 기존 입력 값 복원
        window.addEventListener('DOMContentLoaded', () => {
            const savedUser = JSON.parse(localStorage.getItem('currentUser'));
            if (savedUser) {
                document.getElementById('studentId').value = savedUser.id;
                document.getElementById('studentName').value = savedUser.name;
            }
        });

        // 학번 유효성 검증 함수 (1~3학년, 1~9반, 1~25번)
        function isValidStudentId(id) {
            if (id.length !== 5 || isNaN(id)) return false;
            
            const grade = parseInt(id.substring(0, 1));      // 첫 번째 자리: 학년
            const classNum = parseInt(id.substring(1, 3));   // 2,3번째 자리: 반
            const studentNum = parseInt(id.substring(3, 5)); // 4,5번째 자리: 번호

            // 조건 비교
            const isGradeValid = (grade >= 1 && grade <= 3);
            const isClassValid = (classNum >= 1 && classNum <= 9);
            const isNumValid = (studentNum >= 1 && studentNum <= 25);

            return isGradeValid && isClassValid && isNumValid;
        }

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const studentId = document.getElementById('studentId').value.trim();
            const studentName = document.getElementById('studentName').value.trim();
            const alertBox = document.getElementById('alertMessage');

            // 1. 엑셀 기준 학번 존재 여부(학년/반/번 범위) 확인
            if (!isValidStudentId(studentId)) {
                alertBox.innerHTML = `❌ <strong>존재하지 않는 학번</strong><br>입력하신 학번은 유효하지 않거나 존재하지 않는 학번입니다.<br>(1~3학년, 1~9반, 1~25번만 가능)`;
                alertBox.className = "alert-box danger";
                alertBox.classList.remove('hidden');
                return;
            }

            // 2. 엑셀 기준 연체 기록 확인
            if (overdueExcelSheet.includes(studentId)) {
                alertBox.innerHTML = `⚠️ <strong>대출 불가 (연체자 고지)</strong><br>[${studentName}]님은 현재 엑셀 연체자 목록에 기록이 있어 무인 대출이 불가능합니다.`;
                alertBox.className = "alert-box danger";
                alertBox.classList.remove('hidden');
            } else {
                // 3. 통과 시 데이터 저장 후 이동
                alertBox.classList.add('hidden');
                localStorage.setItem('currentUser', JSON.stringify({ id: studentId, name: studentName }));
                window.location.href = 'loan.html';
            }
        });
    </script>
</body>
</html>
