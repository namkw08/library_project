<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>무인 대출 시스템 - 사용자 인증</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>📚 무인 도서 대출 시스템</h2>
        <p class="subtitle">학번과 이름을 입력해 주세요.</p>
        
        <form id="loginForm">
            <div class="input-group">
                <label for="studentId">학번 (5자리)</label>
                <input type="text" id="studentId" placeholder="예: 30205 (3학년 2반 5번)" maxlength="5" required>
            </div>
            <div class="input-group">
                <label for="studentName">이름</label>
                <input type="text" id="studentName" placeholder="예: 홍길동" required>
            </div>
            <div class="btn-group">
                <button type="button" class="btn btn-secondary" disabled>이전</button>
                <button type="submit" class="btn">다음</button>
            </div>
        </form>

        <div id="alertMessage" class="alert-box hidden"></div>
    </div>

    <a href="admin.html" class="floating-admin-btn" title="관리자 설정">⚙️</a>

    <script>
        // 페이지 로드 시 기존 입력 값 복원
        window.addEventListener('DOMContentLoaded', () => {
            const savedUser = JSON.parse(localStorage.getItem('currentUser'));
            if (savedUser) {
                document.getElementById('studentId').value = savedUser.id;
                document.getElementById('studentName').value = savedUser.name;
            }
        });

        // 학번 포맷 유효성 검증 (1~3학년, 1~9반, 1~25번)
        function isValidStudentId(id) {
            if (id.length !== 5 || isNaN(id)) return false;
            const grade = parseInt(id.substring(0, 1));
            const classNum = parseInt(id.substring(1, 3));
            const studentNum = parseInt(id.substring(3, 5));

            return (grade >= 1 && grade <= 3) && (classNum >= 1 && classNum <= 9) && (studentNum >= 1 && studentNum <= 25);
        }

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const studentId = document.getElementById('studentId').value.trim();
            const studentName = document.getElementById('studentName').value.trim();
            const alertBox = document.getElementById('alertMessage');

            // 1. 학번 규칙 검사
            if (!isValidStudentId(studentId)) {
                alertBox.innerHTML = `❌ <strong>존재하지 않는 학번</strong><br>유효하지 않은 학번입니다. (1~3학년, 1~9반, 1~25번 범위 내 입력)`;
                alertBox.className = "alert-box danger";
                alertBox.classList.remove('hidden');
                return;
            }

            // 2. 관리자 페이지에서 등록한 연체자 엑셀 데이터 가져와 비교
            const overdueStudents = JSON.parse(localStorage.getItem('overdueList') || "[]");
            if (overdueStudents.includes(studentId)) {
                alertBox.innerHTML = `⚠️ <strong>대출 불가 (연체자 고지)</strong><br>[${studentName}]님은 현재 연체 기록이 확인되어 무인 대출이 제한됩니다.`;
                alertBox.className = "alert-box danger";
                alertBox.classList.remove('hidden');
            } else {
                alertBox.classList.add('hidden');
                localStorage.setItem('currentUser', JSON.stringify({ id: studentId, name: studentName }));
                window.location.href = 'loan.html';
            }
        });
    </script>
</body>
</html>
