<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>무인 대출 시스템 - 도서 정보 입력</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<body>
    <div class="container">
        <h2>📖 대출 도서 정보 입력</h2>
        <p class="subtitle"><span id="userName" class="highlight"></span>님, 대출할 도서 정보를 입력해 주세요.</p>
        
        <form id="loanForm">
            <div class="input-group">
                <label for="bookTitle">도서명</label>
                <input type="text" id="bookTitle" placeholder="정확한 도서명을 입력하세요" required>
            </div>
            <div class="input-group">
                <label for="bookAuthor">저자</label>
                <input type="text" id="bookAuthor" placeholder="저자 이름을 입력하세요" required>
            </div>
            <div class="btn-group">
                <button type="button" class="btn btn-secondary" id="prevBtn">이전</button>
                <button type="submit" class="btn">대출 신청</button>
            </div>
        </form>

        <div id="resultMessage" class="alert-box hidden"></div>
    </div>

    <script>
        const currentUser = JSON.parse(localStorage.getItem('currentUser'));
        if (!currentUser) {
            alert('잘못된 접근입니다. 학번 입력을 먼저 해주세요.');
            window.location.href = 'index.html';
        } else {
            document.getElementById('userName').textContent = `${currentUser.id} ${currentUser.name}`;
        }

        document.getElementById('prevBtn').addEventListener('click', () => {
            window.location.href = 'index.html';
        });

        document.getElementById('loanForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const title = document.getElementById('bookTitle').value.trim();
            const author = document.getElementById('bookAuthor').value.trim();
            const resultBox = document.getElementById('resultMessage');

            // 관리자 페이지에서 등록한 보유 도서 데이터 가져오기
            const libraryBooks = JSON.parse(localStorage.getItem('libraryBookList') || "[]");
            const bookExists = libraryBooks.some(book => book.title === title && book.author === author);

            if (bookExists) {
                resultBox.innerHTML = `🎉 <strong>대출 완료!</strong><br>'${title}' 대출 처리가 완료되었습니다. 대출 내역 엑셀 다운로드를 확인하세요.`;
                resultBox.className = "alert-box success";
                exportToExcel(currentUser.id, currentUser.name, title, author);
            } else {
                resultBox.innerHTML = `❌ <strong>존재하지 않는 도서 고지</strong><br>입력하신 '${title}' (${author} 저) 도서는 본 도서관 보유 데이터에 존재하지 않습니다.`;
                resultBox.className = "alert-box danger";
            }
            resultBox.classList.remove('hidden');
        });

        function exportToExcel(studentId, name, bookTitle, bookAuthor) {
            const today = new Date();
            const loanDate = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')} ${String(today.getHours()).padStart(2,'0')}:${String(today.getMinutes()).padStart(2,'0')}`;

            const excelData = [
                ["학번", "이름", "도서명", "저자", "대출일시"],
                [studentId, name, bookTitle, bookAuthor, loanDate]
            ];

            const worksheet = XLSX.utils.aoa_to_sheet(excelData);
            const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, "대출 기록");
            worksheet['!cols'] = [{wch: 12}, {wch: 12}, {wch: 25}, {wch: 20}, {wch: 20}];

            XLSX.writeFile(workbook, `도서대출기록_${studentId}.xlsx`);
        }
    </script>
</body>
</html>
